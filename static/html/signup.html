<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Crear cuenta</h1>
    <form action="/signup" method="post">
        <div class ="form-group">
            <label for="inpUsername">Nombre de usuario:</label>
            <input type="text" id="inpUsername" name="username" required autofocus />
        </div>
        <div class="form-group">
            <label for="inpPassword">Contraseña:</label>
            <input type="password" id="inpPassword" name="password" required />
        </div>
        <div class="form-group">
            <label for="inpPassword2">Confirmar contraseña:</label>
            <input type="password" id="inpPassword2" name="password2" required />
        </div>
        <div class="form-group">
            <button type="submit">Crear cuenta</button>
        </div>
    </form>
</body>
</html>
